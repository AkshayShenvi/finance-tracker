version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_USER: financeuser
      POSTGRES_PASSWORD: financepass
      POSTGRES_DB: financedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  # FastAPI Backend
  backend:
    image: ghcr.io/one-two-many/finance-tracker-backend:latest
    pull_policy: always
    container_name: finance-tracker-backend
    environment:
      FT_DATABASE_URL: postgresql://financeuser:financepass@db:5432/financedb
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: "True"
      # Database connection for migrations
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: financeuser
      DB_NAME: financedb
      POSTGRES_PASSWORD: financepass
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otel-http-sauron.anton-20.com}
      OTEL_SERVICE_NAME: finance-tracker-backend
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.version=1.0.0"
      LOG_LEVEL: "INFO"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finance-network

  # React Frontend
  frontend:
    image: ghcr.io/one-two-many/finance-tracker-frontend:latest
    pull_policy: always
    container_name: finance-tracker-frontend
    environment:
      VITE_OTEL_ENDPOINT: ${VITE_OTEL_ENDPOINT:-https://otel-http-sauron.anton-20.com}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - finance-network

volumes:
  postgres_data:

networks:
  finance-network:
    driver: bridge
