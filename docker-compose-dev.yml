version: '3.8'

# Local-only Postgres for running the backend on the host (e.g. `uvicorn --reload`).
# Defaults below are for local dev convenience only — never use them in production.

services:
  db:
    image: postgres:15-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financepass}
      POSTGRES_DB: ${POSTGRES_DB:-financedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
